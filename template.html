<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERING - Fixture Mundial 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a1628;color:#fff;min-height:100vh}

/* NAVBAR */
.navbar{background:#0d1f3c;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #e63946;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:36px;height:36px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-logo svg{width:24px;height:24px}
.nav-title{font-size:1.1em;font-weight:bold;letter-spacing:2px}
.nav-sub{font-size:0.7em;color:#aaa}
.nav-status{display:flex;align-items:center;gap:6px;font-size:0.8em;color:#2ecc71}
.nav-status span{width:8px;height:8px;background:#2ecc71;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.nav-tabs{display:flex;gap:5px;flex-wrap:wrap}
.nav-tab{padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8em;color:#aaa;border:none;background:none;transition:all 0.2s}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,0.1)}
.nav-tab.active{background:#e63946;color:#fff}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* LANDING */
.landing{min-height:100vh;background:#0a1628;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(circle at 50% 50%, #1a2f4e 0%, #0a1628 70%)}
.landing-logo{width:80px;height:80px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 10px 40px rgba(230,57,70,0.3)}
.landing h1{font-size:3.5em;letter-spacing:6px;margin-bottom:5px}
.landing-sub{color:#aaa;letter-spacing:3px;font-size:0.85em;margin-bottom:5px}
.landing-mundial{font-size:1.3em;font-weight:bold;letter-spacing:2px;margin-bottom:30px}
.landing-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;width:100%;max-width:320px}
.landing-stat{background:#1a2f4e;border-radius:10px;padding:15px;text-align:center}
.landing-stat .n{font-size:2em;font-weight:bold}
.landing-stat .l{color:#aaa;font-size:0.8em;margin-top:3px}
.last-result{background:#1a2f4e;border-radius:12px;padding:15px;width:100%;max-width:320px;margin-bottom:20px;border:1px solid #e63946}
.last-result-title{color:#e63946;font-size:0.7em;letter-spacing:2px;margin-bottom:10px;font-weight:bold}
.last-result-match{display:flex;align-items:center;justify-content:space-around;gap:10px}
.last-result-team{text-align:center;font-size:0.9em;font-weight:bold}
.last-result-score{background:#0d1f3c;padding:10px 15px;border-radius:8px;text-align:center;font-size:1.3em;font-weight:bold}
.btn-start{background:#1a56db;color:#fff;border:none;padding:15px 40px;border-radius:10px;font-size:1em;letter-spacing:2px;cursor:pointer;font-weight:bold;width:100%;max-width:320px;transition:all 0.2s}
.btn-start:hover{background:#1e40af;transform:translateY(-1px)}
.landing-footer{color:#555;font-size:0.75em;margin-top:15px}

/* CONTROL */
.control-header{background:#1a2f4e;padding:25px;border-radius:12px;margin:20px;display:flex;justify-content:space-between;align-items:center}
.control-header h2{font-size:1.5em;font-weight:bold}
.control-header p{color:#aaa;font-size:0.85em;margin-top:5px}
.btn-live{background:#e63946;color:#fff;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.8em;display:flex;align-items:center;gap:5px}
.kpi-grid{display:flex;flex-wrap:wrap;gap:15px;padding:0 20px 20px}
.kpi{background:#1a2f4e;border-radius:10px;padding:20px;flex:1;min-width:150px;border-top:3px solid}
.kpi.blue{border-color:#1a56db}.kpi.red{border-color:#e63946}.kpi.green{border-color:#2ecc71}.kpi.yellow{border-color:#f39c12}.kpi.purple{border-color:#9b59b6}.kpi.teal{border-color:#1abc9c}
.kpi-label{font-size:0.7em;color:#aaa;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.kpi-value{font-size:2.2em;font-weight:bold}
.kpi-sub{font-size:0.75em;color:#aaa;margin-top:5px}
.kpi-link{font-size:0.7em;color:#1a56db;cursor:pointer;margin-top:5px}
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:0 20px 20px}
@media(max-width:768px){.dashboard-grid{grid-template-columns:1fr}}
.dash-card{background:#1a2f4e;border-radius:12px;padding:20px}
.dash-card-title{font-size:0.85em;font-weight:bold;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
.dash-card-title span{color:#aaa;font-size:0.85em;font-weight:normal}
.match-item{padding:10px 0;border-bottom:1px solid #0d1f3c;font-size:0.85em}
.match-item:last-child{border-bottom:none}
.match-item-date{color:#aaa;font-size:0.75em;margin-bottom:4px}
.match-item-teams{display:flex;align-items:center;justify-content:space-between;gap:5px}
.match-item-score{background:#0d1f3c;padding:3px 10px;border-radius:5px;font-weight:bold;font-size:0.9em;white-space:nowrap}
.badge-hoy{background:#e63946;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.7em}
.badge-final{background:#2ecc71;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.7em}
.badge-prox{background:#555;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.7em}
.ranking-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #0d1f3c;font-size:0.85em;gap:10px}
.ranking-item:last-child{border-bottom:none}
.ranking-pos{font-weight:bold;color:#aaa;width:20px}
.ranking-name{flex:1}
.ranking-pts{font-weight:bold;color:#1a56db}
.ranking-bar{height:4px;background:#1a56db;border-radius:2px;margin-top:3px}
.prob-item{display:flex;align-items:center;padding:8px 0;gap:10px;font-size:0.85em;border-bottom:1px solid #0d1f3c}
.prob-item:last-child{border-bottom:none}
.prob-num{font-weight:bold;color:#aaa;width:20px}
.prob-name{flex:1}
.prob-pct{font-weight:bold;color:#1a56db}
.prob-bar-bg{flex:1;background:#0d1f3c;border-radius:2px;height:4px}
.prob-bar-fill{height:4px;background:#1a56db;border-radius:2px}

/* FIXTURE */
.fixture-header{padding:20px}
.fixture-header h2{font-size:1.4em;font-weight:bold;margin-bottom:5px}
.fixture-header p{color:#aaa;font-size:0.85em;margin-bottom:15px}
.view-btns{display:flex;gap:10px;margin-bottom:20px}
.view-btn{padding:8px 18px;border-radius:20px;cursor:pointer;font-size:0.85em;border:2px solid #1a2f4e;background:#1a2f4e;color:#aaa;transition:all 0.2s}
.view-btn.active{background:#1a56db;border-color:#1a56db;color:#fff}
.dates-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:20px}
.date-btn{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:0.8em;border:2px solid #1a2f4e;background:#1a2f4e;color:#aaa;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.date-btn:hover{border-color:#1a56db;color:#fff}
.date-btn.active{background:#e63946;border-color:#e63946;color:#fff}
.day-header{background:#1a56db;border-radius:10px;padding:15px 20px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
.day-header h3{font-weight:bold}
.day-header p{font-size:0.8em;opacity:0.8}
.btn-actualizar{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8em}
.fixture-match{background:#fff;color:#0a1628;border-radius:12px;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:transform 0.2s}
.fixture-match:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,0,0,0.3)}
.fixture-match-header{padding:10px 15px;background:#f8f9fa;display:flex;justify-content:space-between;align-items:center;font-size:0.75em;color:#666}
.fixture-match-body{padding:15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.fixture-team{display:flex;align-items:center;gap:8px;flex:1}
.fixture-team.right{flex-direction:row-reverse;text-align:right}
.fixture-team-flag{font-size:1.5em}
.fixture-team-name{font-weight:bold;font-size:0.95em}
.fixture-score-box{background:#0d1f3c;color:#fff;padding:8px 15px;border-radius:8px;font-weight:bold;font-size:1.1em;text-align:center;min-width:70px}
.fixture-match-footer{padding:6px 15px 10px;font-size:0.75em;color:#888;display:flex;align-items:center;gap:5px}
.group-section{margin-bottom:30px;padding:0 20px}
.group-title{font-size:1.1em;font-weight:bold;margin-bottom:15px;color:#e63946;letter-spacing:1px}

/* CLASIFICACION */
.clas-header{padding:20px}
.clas-header h2{font-size:1.4em;font-weight:bold;margin-bottom:5px}
.clas-header p{color:#aaa;font-size:0.85em;margin-bottom:15px}
.clas-kpis{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.clas-kpi{background:#1a2f4e;border-radius:10px;padding:15px 20px;flex:1;min-width:100px}
.clas-kpi .n{font-size:2em;font-weight:bold;color:#1a56db}
.clas-kpi .l{color:#aaa;font-size:0.75em;text-transform:uppercase;letter-spacing:1px}
.clas-kpi .s{color:#aaa;font-size:0.75em}
.legend{display:flex;gap:15px;margin-bottom:20px;font-size:0.8em}
.legend-item{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%}
.dot.orange{background:#e63946}.dot.blue{background:#1a56db}.dot.gray{background:#555}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:20px;padding:0 20px 20px}
.group-table{background:#1a2f4e;border-radius:12px;overflow:hidden}
.group-table-header{background:#1a56db;padding:12px 15px;display:flex;justify-content:space-between;align-items:center}
.group-table-header h3{font-weight:bold;font-size:0.95em}
.group-badge{background:rgba(255,255,255,0.2);padding:3px 10px;border-radius:10px;font-size:0.75em}
.table-head{display:grid;grid-template-columns:30px 1fr 30px 30px 30px 30px 30px 30px 40px;padding:8px 15px;font-size:0.7em;color:#aaa;border-bottom:1px solid #0d1f3c;gap:5px}
.table-row{display:grid;grid-template-columns:30px 1fr 30px 30px 30px 30px 30px 30px 40px;padding:10px 15px;font-size:0.8em;border-bottom:1px solid #0d1f3c;align-items:center;gap:5px;transition:background 0.2s}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:rgba(255,255,255,0.05)}
.table-row.pos1{background:rgba(230,57,70,0.1)}
.table-row.pos2{background:rgba(26,86,219,0.1)}
.table-pos{font-weight:bold;text-align:center}
.table-team{display:flex;align-items:center;gap:6px;font-weight:bold}
.table-pts{font-weight:bold;color:#1a56db;text-align:center}
.table-num{text-align:center;color:#aaa}

/* ESTADISTICAS */
.stats-header{padding:20px}
.stats-banner{background:#1a56db;border-radius:12px;padding:20px;margin-bottom:20px}
.stats-banner h2{font-size:1.3em;font-weight:bold;margin-bottom:5px}
.stats-banner p{color:rgba(255,255,255,0.7);font-size:0.85em}
.stats-tabs{display:flex;gap:0;background:#1a2f4e;border-radius:10px;overflow:hidden;margin-bottom:20px}
.stats-tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-size:0.85em;color:#aaa;border:none;background:none;transition:all 0.2s}
.stats-tab.active{background:#0d1f3c;color:#fff;font-weight:bold}
.stats-hint{background:#f8f9fa;color:#666;padding:12px 15px;border-radius:8px;font-size:0.8em;margin-bottom:15px;text-align:center}
.player-item{background:#fff;color:#0a1628;border-radius:10px;padding:15px;display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer;transition:transform 0.2s}
.player-item:hover{transform:translateX(3px)}
.player-rank{width:30px;height:30px;background:#1a56db;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.85em;flex-shrink:0}
.player-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.9em;color:#fff;flex-shrink:0}
.player-info{flex:1}
.player-name{font-weight:bold;font-size:0.95em;display:flex;align-items:center;gap:8px}
.player-link{color:#1a56db;font-size:0.75em}
.player-team{color:#666;font-size:0.8em;margin-top:2px}
.player-minutes{color:#999;font-size:0.75em;margin-top:2px}
.player-stat{font-size:1.8em;font-weight:bold;color:#1a56db;text-align:right}
.player-stat-label{font-size:0.65em;color:#999;text-align:right}

/* PREDICCIONES */
.pred-header{padding:20px}
.pred-banner{background:#1a56db;border-radius:12px;padding:20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.pred-banner h2{font-size:1.3em;font-weight:bold;margin-bottom:5px}
.pred-banner p{color:rgba(255,255,255,0.7);font-size:0.85em}
.pts-badge{background:rgba(255,255,255,0.2);border-radius:10px;padding:10px 20px;text-align:center}
.pts-badge .n{font-size:2em;font-weight:bold}
.pts-badge .l{font-size:0.7em;opacity:0.8}
.pred-next{background:#fff;color:#0a1628;border-radius:12px;padding:20px;margin-bottom:20px}
.pred-next-label{font-size:0.75em;color:#e63946;font-weight:bold;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between}
.pred-next-pts{color:#2ecc71}
.pred-flags{display:flex;align-items:center;justify-content:center;gap:20px;margin:15px 0}
.pred-flag-item{text-align:center}
.pred-flag{font-size:2.5em}
.pred-flag-name{font-size:0.85em;font-weight:bold;margin-top:5px}
.pred-date{color:#666;font-size:0.75em;text-align:center;margin-bottom:15px}
.pred-inputs{display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:15px}
.pred-input{width:60px;height:60px;background:#f8f9fa;border:2px solid #e9ecef;border-radius:10px;font-size:1.8em;font-weight:bold;text-align:center;color:#0a1628}
.pred-vs{font-size:1.2em;font-weight:bold;color:#666}
.btn-guardar{background:#1a56db;color:#fff;border:none;padding:15px;border-radius:10px;font-size:1em;cursor:pointer;font-weight:bold;width:100%;transition:all 0.2s}
.btn-guardar:hover{background:#1e40af}
.ranking-title{font-size:0.75em;color:#666;letter-spacing:1px;font-weight:bold;padding:0 5px;margin-bottom:10px}
.pred-rank-item{background:#fff;color:#0a1628;border-radius:10px;padding:12px 15px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.pred-rank-pos{width:30px;height:30px;background:#1a56db;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.8em;flex-shrink:0}
.pred-rank-avatar{width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.85em;color:#fff;flex-shrink:0}
.pred-rank-name{flex:1;font-weight:bold;font-size:0.9em}
.pred-rank-crown{color:#f39c12}
.pred-rank-sub{color:#666;font-size:0.75em}
.pred-rank-pts{font-size:1.5em;font-weight:bold;color:#1a56db}

/* MI EQUIPO */
.team-header{padding:20px}
.team-banner{background:#1a56db;border-radius:12px;padding:20px;display:flex;gap:15px;align-items:center;margin-bottom:20px}
.team-flag-big{font-size:3em}
.team-info h2{font-size:1.3em;font-weight:bold}
.team-info p{color:rgba(255,255,255,0.7);font-size:0.85em;margin-top:5px}
.fav-label{color:#aaa;font-size:0.8em;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.fav-teams{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.fav-btn{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:0.8em;border:2px solid #1a2f4e;background:#1a2f4e;color:#aaa;transition:all 0.2s;display:flex;align-items:center;gap:5px}
.fav-btn:hover{border-color:#1a56db;color:#fff}
.fav-btn.active{background:#1a56db;border-color:#1a56db;color:#fff}
.team-matches-title{font-size:1em;font-weight:bold;margin:15px 0 10px}
.team-match{background:#fff;color:#0a1628;border-radius:12px;margin-bottom:10px;overflow:hidden}
.team-match-header{background:#f8f9fa;padding:8px 15px;font-size:0.75em;color:#666;display:flex;justify-content:space-between}
.team-match-body{padding:15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.team-match-score{background:#1a56db;color:#fff;padding:8px 15px;border-radius:8px;font-weight:bold;font-size:1.1em;text-align:center;min-width:70px}
.team-match-score.pending{background:#555}
.badge-final2{background:#2ecc71;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.7em}
.badge-dest{background:#f39c12;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.7em}
.team-match-footer{padding:5px 15px 10px;font-size:0.75em;color:#888;display:flex;gap:5px;align-items:center;flex-wrap:wrap}

/* ALERTAS */
.alert-header{padding:20px}
.alert-banner{background:#1a56db;border-radius:12px;padding:20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.alert-banner h2{font-size:1.3em;font-weight:bold;margin-bottom:5px}
.alert-banner p{color:rgba(255,255,255,0.7);font-size:0.85em}
.alert-count{background:rgba(255,255,255,0.2);border-radius:10px;padding:10px 20px;text-align:center}
.alert-count .n{font-size:2em;font-weight:bold}
.alert-count .l{font-size:0.7em;opacity:0.8}
.alert-item{background:#1a2f4e;border-radius:12px;padding:15px;display:flex;align-items:center;gap:15px;margin-bottom:10px}
.alert-icon{width:45px;height:45px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3em;flex-shrink:0}
.alert-icon.blue{background:rgba(26,86,219,0.2)}
.alert-icon.red{background:rgba(230,57,70,0.2)}
.alert-icon.yellow{background:rgba(243,156,18,0.2)}
.alert-icon.green{background:rgba(46,204,113,0.2)}
.alert-icon.purple{background:rgba(155,89,182,0.2)}
.alert-text{flex:1}
.alert-text h4{font-weight:bold;font-size:0.9em;margin-bottom:3px}
.alert-text p{color:#aaa;font-size:0.8em}
.toggle{width:50px;height:26px;background:#555;border-radius:13px;cursor:pointer;position:relative;transition:background 0.3s;flex-shrink:0}
.toggle.on{background:#1a56db}
.toggle::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left 0.3s}
.toggle.on::after{left:26px}
.alert-footer{background:#1a2f4e;border-radius:12px;padding:15px;margin-top:10px;font-size:0.8em;color:#aaa;line-height:1.6}
.alert-footer a{color:#1a56db}

/* FLAGS */
.flag{font-size:1.2em}

/* RESPONSIVE */
@media(max-width:600px){
  .nav-tabs{display:none}
  .kpi-grid{padding:0 10px 10px}
  .groups-grid{grid-template-columns:1fr;padding:0 10px 10px}
  .dashboard-grid{padding:0 10px 10px}
}
</style>
</head>
<body>

<!-- LANDING PAGE -->
<div id="page-landing" class="page active">
  <div class="landing">
    <div class="landing-logo">
      <svg viewBox="0 0 40 40" fill="none">
        <rect x="4" y="4" width="14" height="14" rx="3" fill="#e63946"/>
        <rect x="22" y="4" width="14" height="14" rx="3" fill="#1a56db"/>
        <rect x="4" y="22" width="14" height="14" rx="3" fill="#1a56db"/>
        <rect x="22" y="22" width="14" height="14" rx="3" fill="#e63946"/>
      </svg>
    </div>
    <h1>VERING</h1>
    <div class="landing-sub">FIXTURE</div>
    <div class="landing-mundial">MUNDIAL 2026</div>
    <div class="landing-stats" id="landing-stats"></div>
    <div class="last-result" id="last-result"></div>
    <button class="btn-start" onclick="enterApp()">COMENZAR &rarr;</button>
    <div class="landing-footer" id="landing-footer"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="page-app" class="page">
  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-brand">
      <div class="nav-logo">
        <svg viewBox="0 0 40 40" fill="none">
          <rect x="4" y="4" width="14" height="14" rx="3" fill="#e63946"/>
          <rect x="22" y="4" width="14" height="14" rx="3" fill="#1a56db"/>
          <rect x="4" y="22" width="14" height="14" rx="3" fill="#1a56db"/>
          <rect x="22" y="22" width="14" height="14" rx="3" fill="#e63946"/>
        </svg>
      </div>
      <div>
        <div class="nav-title">VERING</div>
        <div class="nav-sub">Mundial 2026</div>
      </div>
      <div class="nav-status" id="nav-status"></div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showSection('control',this)">Control</button>
      <button class="nav-tab" onclick="showSection('fixture',this)">Fixture</button>
      <button class="nav-tab" onclick="showSection('clasificacion',this)">Clasificacion</button>
      <button class="nav-tab" onclick="showSection('estadisticas',this)">Estadisticas</button>
      <button class="nav-tab" onclick="showSection('predicciones',this)">Predicciones</button>
      <button class="nav-tab" onclick="showSection('mequipo',this)">Mi Equipo</button>
      <button class="nav-tab" onclick="showSection('alertas',this)">Alertas</button>
    </div>
  </div>

  <!-- SECTIONS -->
  <div id="sec-control" class="section"></div>
  <div id="sec-fixture" class="section" style="display:none"></div>
  <div id="sec-clasificacion" class="section" style="display:none"></div>
  <div id="sec-estadisticas" class="section" style="display:none"></div>
  <div id="sec-predicciones" class="section" style="display:none"></div>
  <div id="sec-mequipo" class="section" style="display:none"></div>
  <div id="sec-alertas" class="section" style="display:none"></div>
</div>

<script>
const REAL_MATCHES = [];
const REAL_GROUPS = {};

// FLAGS
const FLAGS = {'Mexico':'MX','Estados Unidos':'US','Canada':'CA','Brasil':'BR','Argentina':'AR','Espana':'ES','Francia':'FR','Alemania':'DE','Japon':'JP','Paises Bajos':'NL','Portugal':'PT','Inglaterra':'GB','Croacia':'HR','Marruecos':'MA','Senegal':'SN','Ecuador':'EC','Uruguay':'UY','Colombia':'CO','Paraguay':'PY','Suiza':'CH','Belgica':'BE','Dinamarca':'DK','Australia':'AU','Corea del Sur':'KR','Iran':'IR','Arabia Saudita':'SA','Tunez':'TN','Ghana':'GH','Costa de Marfil':'CI','Egipto':'EG','Argelia':'DZ','Noruega':'NO','Turquia':'TR','Escocia':'GB','Panama':'PA','Haiti':'HT','Bosnia':'BA','Qatar':'QA','Sudafrica':'ZA','Rep. Checa':'CZ','Curacao':'CW','Nueva Zelanda':'NZ','Cabo Verde':'CV','Irak':'IQ','Uzbekistan':'UZ','Congo DR':'CD','Jordania':'JO','Austria':'AT'};
const COLORS = ['#e63946','#1a56db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e74c3c','#3498db','#27ae60','#e67e22','#8e44ad','#16a085'];

function getFlag(team) {
  const code = FLAGS[team];
  if (!code) return '';
  const offset = 127397;
  return Array.from(code).map(c => String.fromCodePoint(c.charCodeAt(0) + offset)).join('');
}

function getAvatar(name, idx) {
  const initials = name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const color = COLORS[idx % COLORS.length];
  return `<div class="player-avatar" style="background:${color}">${initials}</div>`;
}

const matches = REAL_MATCHES;
const today = new Date().toISOString().split('T')[0];

function isToday(dateRaw) { return dateRaw === today; }
function isPast(dateRaw) { return dateRaw < today; }

// ========== LANDING ==========
function buildLanding() {
  const jugados = matches.filter(m=>m.ga!==null).length;
  const goles = matches.reduce((s,m)=>(m.ga!==null?s+m.ga+m.gb:s),0);
  document.getElementById('landing-stats').innerHTML = `
    <div class="landing-stat"><div class="n" style="color:#e63946">${matches.length}</div><div class="l">Partidos</div></div>
    <div class="landing-stat"><div class="n" style="color:#e63946">${jugados}</div><div class="l">Jugados</div></div>
    <div class="landing-stat"><div class="n">${Object.keys(REAL_GROUPS).length * 4}</div><div class="l">Selecciones</div></div>
    <div class="landing-stat"><div class="n">${Object.keys(REAL_GROUPS).length}</div><div class="l">Grupos A-L</div></div>`;
  
  const lastMatch = [...matches].reverse().find(m=>m.ga!==null);
  if (lastMatch) {
    document.getElementById('last-result').innerHTML = `
      <div class="last-result-title">ULTIMO RESULTADO - ${lastMatch.a.toUpperCase()} (Grupo ${lastMatch.g})</div>
      <div class="last-result-match">
        <div class="last-result-team">${getFlag(lastMatch.a)}<br>${lastMatch.a}</div>
        <div class="last-result-score">${lastMatch.ga}<br>-<br>${lastMatch.gb}</div>
        <div class="last-result-team">${getFlag(lastMatch.b)}<br>${lastMatch.b}</div>
      </div>`;
  }
  document.getElementById('landing-footer').textContent = 'v2.1 - Jun 2026 - Datos reales';
}

function enterApp() {
  document.getElementById('page-landing').classList.remove('active');
  document.getElementById('page-app').classList.add('active');
  buildApp();
}

// ========== APP ==========
function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById('sec-'+name).style.display='block';
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

function buildApp() {
  const jugados = matches.filter(m=>m.ga!==null).length;
  const navStatus = document.getElementById('nav-status');
  navStatus.innerHTML = `<span></span> ${jugados} resultados`;

  buildControl();
  buildFixture();
  buildClasificacion();
  buildEstadisticas();
  buildPredicciones();
  buildMEquipo();
  buildAlertas();
}

// ========== CONTROL ==========
function buildControl() {
  const jugados = matches.filter(m=>m.ga!==null).length;
  const goles = matches.reduce((s,m)=>(m.ga!==null?s+m.ga+m.gb:s),0);
  const empates = matches.filter(m=>m.ga!==null&&m.ga===m.gb).length;
  const goleadas = matches.filter(m=>m.ga!==null&&Math.abs(m.ga-m.gb)>=3).length;
  const promedio = jugados>0?(goles/jugados).toFixed(1):0;

  // Standings for ranking
  const standings = buildStandingsData();
  const topTeams = Object.values(standings).sort((a,b)=>b.pts-a.pts||b.gf-a.gf).slice(0,8);

  // Next matches
  const nextMatches = matches.filter(m=>m.ga===null).slice(0,6);
  const todayMatches = matches.filter(m=>isToday(m.dateRaw)&&m.ga===null);
  const recentMatches = [...matches].filter(m=>m.ga!==null).reverse().slice(0,5);

  // Probability (fake but fun)
  const probTeams = topTeams.slice(0,6).map((t,i)=>({name:t.name,pct:Math.max(5,21-i*3-Math.floor(Math.random()*2))}));

  let nextHTML = '';
  [...recentMatches,...nextMatches.slice(0,3)].slice(0,6).forEach(m=>{
    const hoy = isToday(m.dateRaw);
    const fin = m.ga!==null;
    const badge = fin?`<span class="badge-final">Finalizado</span>`:hoy?`<span class="badge-hoy">HOY</span>`:`<span class="badge-prox">Proximo</span>`;
    nextHTML += `<div class="match-item">
      <div class="match-item-date">${m.date} - Grupo ${m.g} - ${m.time}</div>
      <div class="match-item-teams">
        <span>${getFlag(m.a)} <b>${m.a}</b> vs ${getFlag(m.b)} <b>${m.b}</b></span>
        <div style="display:flex;align-items:center;gap:8px">
          ${fin?`<span class="match-item-score">${m.ga}-${m.gb}</span>`:badge}
          ${!fin?badge:''}
        </div>
      </div>
    </div>`;
  });

  let rankHTML = '';
  topTeams.forEach((t,i)=>{
    const maxPts = topTeams[0].pts||1;
    const barW = Math.round((t.pts/maxPts)*100);
    rankHTML += `<div class="ranking-item">
      <div class="ranking-pos">${i+1}</div>
      <div>${getFlag(t.name)}</div>
      <div class="ranking-name">
        <div>${t.name}</div>
        <div class="ranking-bar" style="width:${barW}%"></div>
      </div>
      <div class="ranking-pts">${t.pts}pts</div>
    </div>`;
  });

  let probHTML = '';
  probTeams.forEach((t,i)=>{
    probHTML += `<div class="prob-item">
      <div class="prob-num">${i+1}</div>
      <div>${getFlag(t.name)}</div>
      <div class="prob-name">${t.name}</div>
      <div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${t.pct}%"></div></div>
      <div class="prob-pct">${t.pct}%</div>
    </div>`;
  });

  // Prediction next
  const nextPred = matches.find(m=>m.ga===null);

  document.getElementById('sec-control').innerHTML = `
    <div class="control-header">
      <div>
        <h2>Centro de Control Mundial</h2>
        <p>Dashboard ejecutivo - Hace click en las tarjetas para ver detalle</p>
      </div>
      <button class="btn-live" onclick="showSection('fixture',document.querySelector('.nav-tab:nth-child(2)'))">EN VIVO</button>
    </div>
    <div class="kpi-grid">
      <div class="kpi blue"><div class="kpi-label">PARTIDOS JUGADOS</div><div class="kpi-value">${jugados}</div><div class="kpi-sub">de ${matches.length} - ${Math.round(jugados/matches.length*100)}%</div><div class="kpi-link">ver detalle</div></div>
      <div class="kpi red"><div class="kpi-label">GOLES</div><div class="kpi-value" style="color:#e63946">${goles}</div><div class="kpi-sub">en fase de grupos</div><div class="kpi-link">ver goleadores</div></div>
      <div class="kpi green"><div class="kpi-label">PROMEDIO</div><div class="kpi-value">${promedio}</div><div class="kpi-sub">goles por partido</div><div class="kpi-link">ver detalle</div></div>
      <div class="kpi yellow"><div class="kpi-label">EMPATES</div><div class="kpi-value">${empates}</div><div class="kpi-sub">${jugados>0?Math.round(empates/jugados*100):0}% de partidos</div><div class="kpi-link">ver partidos</div></div>
      <div class="kpi purple"><div class="kpi-label">GOLEADAS +3</div><div class="kpi-value">${goleadas}</div><div class="kpi-sub">diferencia 3+ goles</div><div class="kpi-link">ver partidos</div></div>
      <div class="kpi teal"><div class="kpi-label">GRUPOS</div><div class="kpi-value">${Object.keys(REAL_GROUPS).length}</div><div class="kpi-sub">A-L - ${Object.keys(REAL_GROUPS).length*4} selecciones</div><div class="kpi-link">ver tabla</div></div>
    </div>
    <div class="dashboard-grid">
      <div class="dash-card">
        <div class="dash-card-title">Proximos Partidos <span>${matches.filter(m=>m.ga===null).length} restantes</span></div>
        ${nextHTML}
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Ranking Selecciones <span>por puntos</span></div>
        ${rankHTML}
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Probabilidad Campeon <span>rendimiento actual</span></div>
        ${probHTML}
      </div>
      ${nextPred?`<div class="dash-card">
        <div style="text-align:center;color:#aaa;font-size:0.8em;margin-bottom:15px">MI PREDICCION - PROXIMO PARTIDO</div>
        <div style="text-align:center;font-size:1.1em;margin-bottom:15px">${getFlag(nextPred.a)} <b>${nextPred.a}</b> vs ${getFlag(nextPred.b)} <b>${nextPred.b}</b></div>
        <div style="display:flex;justify-content:center;gap:15px;margin-bottom:15px">
          <input type="number" min="0" max="20" value="0" style="width:60px;height:60px;background:#f8f9fa;border:2px solid #ddd;border-radius:10px;font-size:1.8em;font-weight:bold;text-align:center;color:#0a1628">
          <span style="font-size:1.5em;font-weight:bold;color:#aaa;line-height:60px">:</span>
          <input type="number" min="0" max="20" value="0" style="width:60px;height:60px;background:#f8f9fa;border:2px solid #ddd;border-radius:10px;font-size:1.8em;font-weight:bold;text-align:center;color:#0a1628">
        </div>
        <button class="btn-guardar" onclick="alert('Prediccion guardada!')">Guardar prediccion &rarr;</button>
      </div>`:''}
    </div>`;
}

// ========== FIXTURE ==========
function buildFixture() {
  const dates = [...new Set(matches.map(m=>m.dateRaw))].sort();
  const groups = Object.keys(REAL_GROUPS).sort();
  
  let datesHTML = dates.map(d=>{
    const m = matches.find(mm=>mm.dateRaw===d);
    const hoy = d===today;
    return `<button class="date-btn${hoy?' active':''}" onclick="filterByDate('${d}',this)">${m?m.date:d}${hoy?' <span style="color:#fff">&#9679;</span>':''}</button>`;
  }).join('');

  const activeDate = today;
  const todayMatches = matches.filter(m=>m.dateRaw===activeDate);
  const showMatches = todayMatches.length>0?todayMatches:matches.filter(m=>m.dateRaw===dates[0]);

  document.getElementById('sec-fixture').innerHTML = `
    <div class="fixture-header">
      <h2>Fixture - Mundial 2026</h2>
      <p>Hace click en un partido para ver estadisticas detalladas</p>
      <div class="view-btns">
        <button class="view-btn active" id="btn-fecha" onclick="switchView('fecha',this)">Por Fecha</button>
        <button class="view-btn" id="btn-grupo" onclick="switchView('grupo',this)">Por Grupo</button>
      </div>
      <div class="dates-scroll" id="dates-scroll">${datesHTML}</div>
    </div>
    <div id="fixture-content" style="padding:0 20px 20px"></div>`;

  renderByDate(showMatches, activeDate);
}

window.filterByDate = function(date, btn) {
  document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = matches.filter(m=>m.dateRaw===date);
  renderByDate(filtered, date);
};

window.switchView = function(view, btn) {
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(view==='grupo') renderByGroup();
  else {
    const activeDateBtn = document.querySelector('.date-btn.active');
    const date = activeDateBtn?activeDateBtn.getAttribute('onclick').match(/'([^']+)'/)[1]:today;
    renderByDate(matches.filter(m=>m.dateRaw===date), date);
  }
};

function renderByDate(dayMatches, date) {
  const hoy = date===today;
  const fin = dayMatches.filter(m=>m.ga!==null).length;
  const matchesHTML = dayMatches.map(m=>buildFixtureMatchCard(m)).join('');
  const dateLabel = dayMatches[0]?dayMatches[0].date:date;
  document.getElementById('fixture-content').innerHTML = `
    <div class="day-header">
      <div><h3>${dayMatches.length} partidos - ${dateLabel}${hoy?' - HOY':''}</h3><p>Grupos ${[...new Set(dayMatches.map(m=>'Grupo '+m.g))].join(', ')} - ${fin} finalizados</p></div>
      <button class="btn-actualizar">Actualizar</button>
    </div>
    ${matchesHTML||'<div style="text-align:center;padding:40px;color:#aaa">No hay partidos en esta fecha</div>'}`;
}

function renderByGroup() {
  const groups = Object.keys(REAL_GROUPS).sort();
  let html = '';
  groups.forEach(g=>{
    const gMatches = matches.filter(m=>m.g===g);
    html += `<div class="group-section"><div class="group-title">GRUPO ${g}</div>${gMatches.map(m=>buildFixtureMatchCard(m)).join('')}</div>`;
  });
  document.getElementById('fixture-content').innerHTML = html;
}

function buildFixtureMatchCard(m) {
  const fin = m.ga!==null;
  const hoy = isToday(m.dateRaw);
  const badge = fin?`<span class="badge-final">Finalizado</span>`:hoy?`<span class="badge-hoy">HOY</span>`:`<span class="badge-prox">Proximo</span>`;
  const score = fin?`${m.ga} - ${m.gb}`:`- : -`;
  const goalsHTML = (m.goals1&&m.goals1.length>0||m.goals2&&m.goals2.length>0)?
    `<div style="font-size:0.7em;color:#888;padding:5px 15px 10px;display:flex;gap:10px;flex-wrap:wrap">
      ${(m.goals1||[]).map(g=>`<span>&#9917; ${g.name} ${g.minute}'</span>`).join('')}
      ${(m.goals2||[]).map(g=>`<span>&#9917; ${g.name} ${g.minute}'</span>`).join('')}
    </div>`:'';
  return `<div class="fixture-match">
    <div class="fixture-match-header"><span>${m.date} - ${m.time} hs - Grupo ${m.g}</span>${badge}</div>
    <div class="fixture-match-body">
      <div class="fixture-team">${getFlag(m.a)?`<span class="fixture-team-flag">${getFlag(m.a)}</span>`:''}<span class="fixture-team-name">${m.a}</span></div>
      <div class="fixture-score-box">${score}</div>
      <div class="fixture-team right"><span class="fixture-team-name">${m.b}</span>${getFlag(m.b)?`<span class="fixture-team-flag">${getFlag(m.b)}</span>`:''}</div>
    </div>
    <div class="fixture-match-footer">&#128205; ${m.city} <span style="color:#ccc">toca para ver detalles</span></div>
    ${goalsHTML}
  </div>`;
}

// ========== CLASIFICACION ==========
function buildStandingsData() {
  const standings = {};
  matches.forEach(m=>{
    [m.a,m.b].forEach(t=>{if(!standings[t])standings[t]={name:t,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0,group:''}});
    if(m.g){standings[m.a].group=m.g;standings[m.b].group=m.g;}
    if(m.ga!==null){
      standings[m.a].pj++;standings[m.b].pj++;
      standings[m.a].gf+=m.ga;standings[m.a].gc+=m.gb;
      standings[m.b].gf+=m.gb;standings[m.b].gc+=m.ga;
      standings[m.a].dg+=m.ga-m.gb;standings[m.b].dg+=m.gb-m.ga;
      if(m.ga>m.gb){standings[m.a].pg++;standings[m.a].pts+=3;standings[m.b].pp++;}
      else if(m.ga<m.gb){standings[m.b].pg++;standings[m.b].pts+=3;standings[m.a].pp++;}
      else{standings[m.a].pe++;standings[m.b].pe++;standings[m.a].pts++;standings[m.b].pts++;}
    }
  });
  return standings;
}

function buildClasificacion() {
  const standings = buildStandingsData();
  const jugados = matches.filter(m=>m.ga!==null).length;
  const goles = matches.reduce((s,m)=>(m.ga!==null?s+m.ga+m.gb:s),0);
  const promedio = jugados>0?(goles/jugados).toFixed(1):0;
  const groups = Object.keys(REAL_GROUPS).sort();

  let groupsHTML = '';
  groups.forEach(g=>{
    const teams = (REAL_GROUPS[g]||[]).map(t=>standings[t]||{name:t,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0})
      .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
    const rowsHTML = teams.map((t,i)=>`
      <div class="table-row ${i===0?'pos1':i===1?'pos2':''}">
        <div class="table-pos">${i+1}</div>
        <div class="table-team">${getFlag(t.name)||''} ${t.name}</div>
        <div class="table-num">${t.pj}</div>
        <div class="table-num">${t.pg}</div>
        <div class="table-num">${t.pe}</div>
        <div class="table-num">${t.pp}</div>
        <div class="table-num">${t.gf}</div>
        <div class="table-num">${t.gc}</div>
        <div class="table-pts">${t.pts}</div>
      </div>`).join('');
    groupsHTML += `<div class="group-table">
      <div class="group-table-header"><h3>GRUPO ${g}</h3><span class="group-badge">${teams.length} equipos</span></div>
      <div class="table-head"><span>#</span><span>EQUIPO</span><span>PJ</span><span>PG</span><span>PE</span><span>PP</span><span>GF</span><span>GC</span><span>PTS</span></div>
      ${rowsHTML}
    </div>`;
  });

  document.getElementById('sec-clasificacion').innerHTML = `
    <div class="clas-header">
      <h2>Clasificacion - Mundial 2026</h2>
      <p>Tabla de posiciones con datos oficiales</p>
      <div class="clas-kpis">
        <div class="clas-kpi"><div class="n">${jugados}</div><div class="l">Partidos</div><div class="s">de ${matches.length}</div></div>
        <div class="clas-kpi"><div class="n">${goles}</div><div class="l">Goles</div><div class="s">en grupos</div></div>
        <div class="clas-kpi"><div class="n">${promedio}</div><div class="l">Promedio</div><div class="s">por partido</div></div>
        <div class="clas-kpi"><div class="n">${groups.length}</div><div class="l">Grupos</div><div class="s">A-L</div></div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="dot orange"></div> 1 del grupo</div>
        <div class="legend-item"><div class="dot blue"></div> 2 del grupo</div>
        <div class="legend-item"><div class="dot gray"></div> Eliminado</div>
      </div>
    </div>
    <div class="groups-grid">${groupsHTML}</div>`;
}

// ========== ESTADISTICAS ==========
function buildEstadisticas() {
  const scorers = {};
  matches.forEach(m=>{
    if(m.goals1) m.goals1.forEach(g=>{if(!scorers[g.name])scorers[g.name]={name:g.name,team:m.a,goals:0,minutes:[]};scorers[g.name].goals++;scorers[g.name].minutes.push(g.minute);});
    if(m.goals2) m.goals2.forEach(g=>{if(!scorers[g.name])scorers[g.name]={name:g.name,team:m.b,goals:0,minutes:[]};scorers[g.name].goals++;scorers[g.name].minutes.push(g.minute);});
  });
  const topScorers = Object.values(scorers).sort((a,b)=>b.goals-a.goals).slice(0,10);

  let scorersHTML = '';
  if(topScorers.length===0) {
    scorersHTML = '<div style="text-align:center;padding:30px;color:#aaa">Cargando goleadores...</div>';
  } else {
    topScorers.forEach((p,i)=>{
      scorersHTML += `<div class="player-item">
        <div class="player-rank">${i+1}</div>
        ${getAvatar(p.name, i)}
        <div class="player-info">
          <div class="player-name">${p.name} <span class="player-link">ver perfil</span></div>
          <div class="player-team">${getFlag(p.team)||''} ${p.team}</div>
          <div class="player-minutes">&#9917; ${p.minutes.join(', ')}'</div>
        </div>
        <div><div class="player-stat">${p.goals}</div><div class="player-stat-label">${p.goals===1?'GOL':'GOLES'}</div></div>
      </div>`;
    });
  }

  document.getElementById('sec-estadisticas').innerHTML = `
    <div class="stats-header">
      <div class="stats-banner"><h2>Estadisticas</h2><p>Goleadores - Asistencias - Tarjetas - Equipos</p></div>
      <div class="stats-tabs">
        <button class="stats-tab active">&#9917; Goleadores</button>
        <button class="stats-tab">&#127919; Asistencias</button>
        <button class="stats-tab">&#127384; Tarjetas</button>
        <button class="stats-tab">&#128202; Equipos</button>
      </div>
      <div class="stats-hint">&#128072; Toca cualquier jugador para ver su perfil completo</div>
      ${scorersHTML}
    </div>`;
}

// ========== PREDICCIONES ==========
function buildPredicciones() {
  const nextMatch = matches.find(m=>m.ga===null);
  const predRanking = [
    {name:'Juan Perez', pts:48, aciertos:8, exactos:2},
    {name:'Maria Gonzalez', pts:36, aciertos:7, exactos:1},
    {name:'Carlos Ramirez', pts:30, aciertos:6, exactos:0},
    {name:'Ana Lopez', pts:24, aciertos:5, exactos:1},
    {name:'Luis Martinez', pts:18, aciertos:4, exactos:0},
  ];

  let predHTML = '';
  if(nextMatch) {
    predHTML = `<div class="pred-next">
      <div class="pred-next-label"><span>&#127919; PROXIMO PARTIDO</span><span class="pred-next-pts">+10 pts exacto</span></div>
      <div class="pred-flags">
        <div class="pred-flag-item"><div class="pred-flag">${getFlag(nextMatch.a)||'&#127988;'}</div><div class="pred-flag-name">${nextMatch.a}</div></div>
        <div style="color:#aaa;font-size:1.2em;font-weight:bold">VS</div>
        <div class="pred-flag-item"><div class="pred-flag">${getFlag(nextMatch.b)||'&#127988;'}</div><div class="pred-flag-name">${nextMatch.b}</div></div>
      </div>
      <div class="pred-date">${nextMatch.date} - ${nextMatch.time} hs - Grupo ${nextMatch.g} - ${nextMatch.city}</div>
      <div class="pred-inputs">
        <input type="number" min="0" max="20" value="0" class="pred-input">
        <span class="pred-vs">:</span>
        <input type="number" min="0" max="20" value="0" class="pred-input">
      </div>
      <button class="btn-guardar" onclick="alert('Prediccion guardada! +10pts si acertas el resultado exacto')">Guardar prediccion &rarr;</button>
    </div>`;
  }

  let rankHTML = predRanking.map((p,i)=>{
    const colors=['#1a56db','#e63946','#f39c12','#2ecc71','#9b59b6'];
    const initials=p.name.split(' ').map(w=>w[0]).join('');
    return `<div class="pred-rank-item">
      <div class="pred-rank-pos">${i+1}</div>
      <div class="pred-rank-avatar" style="background:${colors[i]}">${initials}</div>
      <div style="flex:1"><div class="pred-rank-name">${p.name} ${i===0?'<span class="pred-rank-crown">&#128081; LIDER</span>':''}</div><div class="pred-rank-sub">${p.aciertos} aciertos - ${p.exactos} exactos</div></div>
      <div class="pred-rank-pts">${p.pts}</div>
    </div>`;
  }).join('');

  document.getElementById('sec-predicciones').innerHTML = `
    <div class="pred-header">
      <div class="pred-banner">
        <div><h2>Mis Predicciones</h2><p>Predeci resultados - gana puntos</p></div>
        <div class="pts-badge"><div class="n">0</div><div class="l">MIS PUNTOS</div></div>
      </div>
      ${predHTML}
      <div class="ranking-title">RANKING DE PREDICCIONES</div>
      ${rankHTML}
    </div>`;
}

// ========== MI EQUIPO ==========
let favTeam = 'Paraguay';
function buildMEquipo() {
  const favTeams = ['Paraguay','Argentina','Brasil','Uruguay','Estados Unidos','Mexico','Espana','Francia','Alemania','Portugal','Inglaterra','Italia','Colombia','Canada'];
  const teamMatches = matches.filter(m=>m.a===favTeam||m.b===favTeam);

  let favBtnsHTML = favTeams.filter(t=>matches.some(m=>m.a===t||m.b===t)).map(t=>`
    <button class="fav-btn${t===favTeam?' active':''}" onclick="changeFavTeam('${t}',this)">${getFlag(t)||''} ${t}</button>`).join('');

  const standings = buildStandingsData();
  const ts = standings[favTeam]||{pj:0,pts:0,g:'?'};

  let matchesHTML = teamMatches.map(m=>{
    const fin = m.ga!==null;
    const isHome = m.a===favTeam;
    const score = fin?(isHome?`${m.ga}-${m.gb}`:`${m.gb}-${m.ga}`):'- : -';
    const badge = fin?`<span class="badge-final2">Finalizado</span>`:isToday(m.dateRaw)?`<span class="badge-hoy">HOY</span>`:`<span class="badge-dest">Destacado</span>`;
    const opp = isHome?m.b:m.a;
    const goalsAll = [...(m.goals1||[]).map(g=>({...g,team:m.a})),...(m.goals2||[]).map(g=>({...g,team:m.b}))];
    const goalsHTML = goalsAll.length>0?goalsAll.map(g=>`<span>&#9917; ${g.name} ${g.minute}'</span>`).join(' '):'';
    return `<div class="team-match">
      <div class="team-match-header"><span>${m.date} - ${m.time} hs - Grupo ${m.g}</span>${badge}</div>
      <div class="team-match-body">
        <div style="flex:1;font-weight:bold">${getFlag(favTeam)||''} ${favTeam}</div>
        <div class="team-match-score${fin?'':' pending'}">${score}</div>
        <div style="flex:1;font-weight:bold;text-align:right">${getFlag(opp)||''} ${opp}</div>
      </div>
      <div class="team-match-footer">&#128205; ${m.city} ${goalsHTML?'&#183; '+goalsHTML:''}</div>
    </div>`;
  }).join('') || '<div style="text-align:center;padding:30px;color:#aaa">No hay partidos para este equipo</div>';

  document.getElementById('sec-mequipo').innerHTML = `
    <div class="team-header">
      <div class="team-banner">
        <div class="team-flag-big">${getFlag(favTeam)||'&#127988;'}</div>
        <div class="team-info">
          <h2>${favTeam}</h2>
          <p>Grupo ${ts.group||'?'} - Posicion ${ts.pts>0?'activa':'4'} - ${ts.pj} partido${ts.pj!==1?'s':''} jugado${ts.pj!==1?'s':''}</p>
        </div>
      </div>
      <div class="fav-label">SELECCIONA TU EQUIPO FAVORITO</div>
      <div class="fav-teams" id="fav-teams">${favBtnsHTML}</div>
      <div class="team-matches-title">Partidos de ${favTeam}</div>
      <div id="team-matches">${matchesHTML}</div>
    </div>`;
}

window.changeFavTeam = function(team, btn) {
  favTeam = team;
  buildMEquipo();
};

  const alerts = [
    {icon:'&#127758;',cls:'blue',title:'Antes de cada partido',desc:'Aviso 30 min antes del inicio',on:true},
    {icon:'PY',cls:'red',title:'Partidos de Paraguay',desc:'Recordatorio de la Albirroja (Grupo D)',on:true},
    {icon:'&#127942;',cls:'yellow',title:'Clasificados a Ronda de 32',desc:'Aviso al terminar la fase de grupos',on:true},
    {icon:'&#127919;',cls:'green',title:'Mis Predicciones',desc:'Recordatorio antes de cada partido',on:true},
    {icon:'&#128202;',cls:'purple',title:'Cambios en la tabla',desc:'Cuando cambien posiciones en tu grupo',on:false},
  ];
  let alertsHTML = alerts.map(a=>`<div class="alert-item">
    <div class="alert-icon ${a.cls}">${a.icon}</div>
    <div class="alert-text"><h4>${a.title}</h4><p>${a.desc}</p></div>
    <div class="toggle${a.on?' on':''}" onclick="this.classList.toggle('on')"></div>

  document.getElementById('sec-alertas').innerHTML = `
    <div class="alert-header">
      <div class="alert-banner">
        <div><h2>Mis Alertas</h2><p>Configura tus avisos del Mundial</p></div>
        <div class="alert-count"><div class="n">${alerts.filter(a=>a.on).length}</div><div class="l">ACTIVAS</div></div>
      </div>
      ${alertsHTML}
      <div class="alert-footer">
        &#128196; <b>Fuente de datos</b><br>
        Datos de <a href="#">openfootball/worldcup.json</a> - codigo abierto, sin API key. Toca <b>Actualizar</b> en Fixture para sincronizar.
      </div>
    </div>`;
}
