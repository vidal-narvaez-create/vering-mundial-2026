name: Actualizar VERING Mundial 2026
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Patch Campeones
        run: python3 patch_campeones.py
      - name: Patch Destacado
        run: python3 patch_destacado.py
      - name: Patch Emparejamiento
        run: python3 patch_emparejamiento.py
      - name: Patch Emparejamiento V2
        run: python3 patch_emparejamiento_v2.py
      - name: Patch Fase Final
        run: python3 patch_fase_final.py
      - name: Patch Bracket
        run: python3 patch_bracket.py
      - name: Patch Contadores
        run: python3 patch_contadores.py
      - name: Generar HTML
        run: python3 build.py
      - name: Publicar en GitHub Pages
        run: |
          cp dist/index.html index.html
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Auto-update $(date '+%Y-%m-%d %H:%M')" || echo "Sin cambios"
          git push
